<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
/* =========================================================
   FESTIVAL APP — CSS NETTOYÉ & DOCUMENTÉ
   ========================================================= */

:root {
  --bg: #F6F2E9;
  --bg-soft: #EFE8DB;
  --bg-soft-2: #F3EEE4;
  --card: #FFFDF7;
  --card-soft: #F8F3EA;

  --text: #18443D;
  --text-strong: #0F5A4F;
  --muted: #6F7364;
  --muted-2: #8C7A63;

  --line: #DED4C2;
  --line-soft: rgba(222, 212, 194, 0.72);

  --primary: #0F5A4F;
  --primary-dark: #18443D;
  --primary-deep: #123D38;
  --primary-soft: #E4EEE8;
  --primary-soft-2: #EDF5F0;

  --accent: #B86B24;
  --accent-dark: #96561D;
  --accent-soft: #FFF0DF;
  --accent-gold: #D9B165;

  --success: #1F7A5C;
  --warning: #C7772F;
  --neutral: #8A7E70;

  --ref-bg: #EEF4EC;
  --ref-line: #C8D8C7;

  --dark: #18443D;

  --shadow-xs: 0 2px 8px rgba(78, 57, 31, 0.06);
  --shadow-soft: 0 6px 18px rgba(78, 57, 31, 0.08);
  --shadow: 0 12px 28px rgba(78, 57, 31, 0.10);
  --shadow-strong: 0 18px 40px rgba(78, 57, 31, 0.14);

  --radius-xs: 12px;
  --radius-sm: 16px;
  --radius: 18px;
  --radius-lg: 24px;
  --radius-pill: 999px;

  --bottomnav-h: 88px;
}

html,
body {
  margin: 0;
  padding: 0;
  width: 100%;
  min-height: 100%;
  background:
    radial-gradient(circle at top right, rgba(184, 107, 36, 0.16), transparent 30%),
    radial-gradient(circle at top left, rgba(123, 79, 163, 0.10), transparent 24%),
    radial-gradient(circle at bottom left, rgba(15, 90, 79, 0.10), transparent 34%),
    linear-gradient(180deg, #F8F4EC 0%, #F3EEE4 48%, #EFE8DB 100%);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  color: var(--text);
}

* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  text-rendering: optimizeLegibility;
}

.app-shell {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.hidden {
  display: none !important;
}

.main-content {
  flex: 1 1 auto;
  min-height: 0;
  overflow-y: auto;
  padding: 12px;
  padding-bottom: calc(var(--bottomnav-h) + 18px);
  -webkit-overflow-scrolling: touch;
  scroll-behavior: auto;
}

.main-content,
#contactsContent,
#contactsPeopleList {
  overflow-anchor: none;
}

.mini-page-title {
  font-size: 0.84rem;
  font-weight: 1000;
  color: var(--primary-dark);
  text-transform: uppercase;
  letter-spacing: 0.10em;
  text-align: center;
  padding: 4px 4px 12px 4px;
  text-shadow: 0 1px 0 rgba(255, 255, 255, 0.5);
}

.mini-page-title.home-title {
  display: none !important;
}

.page {
  display: none;
}

.page.active {
  display: block;
}

.card {
  position: relative;
  background: linear-gradient(180deg, rgba(255, 253, 248, 0.98) 0%, rgba(255, 249, 241, 0.98) 100%);
  border-radius: 16px;
  padding: 10px 12px !important;
  box-shadow: var(--shadow);
  margin-bottom: 10px;
  transition:
    transform 0.16s ease,
    box-shadow 0.16s ease,
    border-color 0.16s ease,
    background 0.16s ease;
  border: 1px solid rgba(222, 212, 194, 0.78);
  backdrop-filter: blur(3px);
}

.contact-section-card {
  border-radius: 20px;
  padding: 8px;
}

.ref-card.contact-section-card {
  padding: 12px;
}

.card.compact {
  padding: 8px 10px !important;
}

.card.ref-card {
  background: linear-gradient(180deg, #F1F7EF 0%, #EDF4EB 100%);
  border: 1px solid var(--ref-line);
}

.card.user-card {
  background: linear-gradient(135deg, #F7F1E7 0%, #FBF7EF 100%);
  border: 1px solid #E4D7C4;
  padding: 9px 10px;
}

.card.home-main-card {
  position: relative;
  border: 1px solid rgba(15, 90, 79, 0.12);
  border-left: 7px solid var(--accent);
  background:
    linear-gradient(135deg, rgba(15, 90, 79, 0.10), rgba(184, 107, 36, 0.12)),
    linear-gradient(180deg, #FFFDF8 0%, #FFF6EB 100%);
  box-shadow: 0 14px 28px rgba(78, 57, 31, 0.10);
  overflow: hidden;
}

.card.home-main-card::after {
  content: "✿";
  position: absolute;
  top: 12px;
  right: 14px;
  font-size: 1.3rem;
  color: rgba(184, 107, 36, 0.26);
  font-weight: 900;
}

.card.home-meta-card {
  background: linear-gradient(180deg, #F7F2E9 0%, #F1EBDD 100%);
  border: 1px solid #E2D6C3;
  border-radius: 22px;
}

.clickable-card {
  cursor: pointer;
}

.clickable-card:hover {
  transform: translateY(-1px);
  box-shadow: 0 14px 30px rgba(78, 57, 31, 0.13);
}

.clickable-card:active {
  transform: scale(0.995);
}

.auth-wrap {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
}

.auth-card {
  width: 100%;
  max-width: 440px;
  background: linear-gradient(180deg, #FFFDF7 0%, #FFF8EF 100%);
  border-radius: 20px;
  box-shadow: var(--shadow-strong);
  padding: 22px;
  border: 1px solid rgba(222, 212, 194, 0.9);
}

.auth-title {
  font-size: 24px;
  font-weight: 1000;
  margin-bottom: 8px;
  color: var(--primary-dark);
}

.auth-subtitle {
  color: var(--muted);
  font-size: 14px;
  margin-bottom: 16px;
  line-height: 1.45;
}

.input {
  width: 100%;
  border-radius: 14px;
  border: 1px solid #d6e3db;
  background: linear-gradient(180deg, #ffffff 0%, #f6fbf8 100%);
  padding: 10px 14px;
  font-size: 15px;
  box-shadow:
    0 4px 10px rgba(15, 90, 79, 0.07),
    inset 0 1px 0 rgba(255, 255, 255, 0.8);
  transition: all 0.15s ease;
}

.input::placeholder {
  color: #9B9287;
}

.input:focus {
  outline: none;
  border-color: #9fc9b8;
  box-shadow:
    0 0 0 3px rgba(159, 201, 184, 0.25),
    0 6px 14px rgba(15, 90, 79, 0.10);
}

.btn-dark,
.btn-light {
  width: 100%;
  border: none;
  border-radius: 14px;
  padding: 13px 14px;
  font-size: 15px;
  cursor: pointer;
  font-weight: 900;
  transition: transform 0.14s ease, box-shadow 0.14s ease, opacity 0.14s ease;
}

.btn-dark:active,
.btn-light:active,
.btn:active,
.direct-main-btn:active,
.action-icon-btn:active,
.phone-btn:active,
.home-profile-btn:active,
.nav-item:active {
  transform: scale(0.96);
  opacity: 0.85;
}

.btn-dark {
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
  color: white;
  box-shadow: 0 8px 18px rgba(15, 90, 79, 0.18);
}

.btn-light {
  background: #FFFDF8;
  color: var(--primary-dark);
  border: 1px solid var(--line);
  margin-top: 10px;
}

.error {
  color: #b91c1c;
  margin-top: 10px;
  white-space: pre-wrap;
  word-break: break-word;
  font-weight: 700;
}

.success {
  color: #047857;
  margin-top: 10px;
  font-weight: 700;
}

.user-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-height: 50vh;
  overflow-y: auto;
  margin-top: 12px;
}

.user-row {
  width: 100%;
  text-align: left;
  background: #FFFDF8;
  border: 1px solid #DCCFB9;
  border-radius: 14px;
  padding: 12px;
  font-size: 15px;
  cursor: pointer;
  color: var(--text);
  font-weight: 800;
  transition: transform 0.14s ease, border-color 0.14s ease, box-shadow 0.14s ease, background 0.14s ease;
}

.user-row.active-user {
  background: linear-gradient(135deg, rgba(15, 90, 79, 0.10), rgba(184, 107, 36, 0.08));
  border-color: var(--primary);
  font-weight: 1000;
  box-shadow: var(--shadow-xs);
}

.user-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  border-radius: 14px;
  padding: 0;
  margin-bottom: 0;
  box-shadow: none;
}

.user-info {
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.user-label {
  font-size: 0.64rem;
  color: var(--muted);
  font-weight: 800;
  text-transform: none;
  letter-spacing: 0.01em;
  line-height: 1.08;
}

.user-name {
  font-size: 0.94rem;
  font-weight: 1000;
  color: var(--primary-dark);
  line-height: 1.1;
  word-break: break-word;
}

.action-icon-btn {
  width: 38px;
  height: 38px;
  border: 1px solid #E0D3BF;
  border-radius: 12px;
  background: #FFF9EF;
  color: var(--primary-dark);
  font-size: 0.92rem;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: var(--shadow-xs);
  flex-shrink: 0;
  transition: transform 0.14s ease, box-shadow 0.14s ease, background 0.14s ease;
}

.meta-line {
  font-size: 0.80rem;
  color: #887A68;
  margin-bottom: 10px;
  font-weight: 1000;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  white-space: nowrap;
  padding: 7px 12px;
  border-radius: 999px;
  color: white;
  font-weight: 1000;
  font-size: 0.76rem;
  margin-bottom: 0;
  line-height: 1;
  box-shadow: 0 4px 10px rgba(78, 57, 31, 0.10);
}

.badge.current { background: linear-gradient(135deg, #1F7A5C, #0F5A4F); }
.badge.next { background: linear-gradient(135deg, #D28A3E, #B86B24); }
.badge.previous { background: linear-gradient(135deg, #9A8B7B, #7B6F62); }

.shift-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 10px;
}

.shift-line {
  flex: 1;
  min-width: 0;
  font-size: 1.14rem;
  font-weight: 1000;
  margin: 0;
  color: var(--primary-dark);
  line-height: 1.1 !important;
  text-transform: uppercase;
  letter-spacing: -0.02em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.helper-text {
  color: #3F4F48;
  font-size: 1rem;
  font-weight: 850;
  line-height: 1.4;
  margin-bottom: 10px;
}

.subtle-text {
  color: var(--muted);
  font-size: 0.95rem;
  line-height: 1.1 !important;
}

.no-slot {
  text-align: center;
  padding: 18px 10px 8px;
}

.no-slot-title {
  font-size: 1.18rem;
  font-weight: 1000;
  margin-top: 0;
  color: var(--primary-dark);
}

.no-slot-sub {
  font-size: 0.98rem;
  color: var(--muted);
  margin-top: 10px;
  line-height: 1.4;
}

.no-slot-emoji {
  display: none;
}

.timer-line {
  margin-top: 12px;
  font-size: 1rem;
  font-weight: 1000;
  color: var(--accent-dark);
  text-align: center;
}

.group-label {
  font-weight: 1000;
  font-size: 0.84rem;
  color: #8C7A63;
  margin: 18px 0 10px 0;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  padding-bottom: 6px;
  border-bottom: 1px solid rgba(184, 107, 36, 0.18);
}

.team-member {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 13px 0;
  border-top: 1px solid rgba(222, 212, 194, 0.65);
  font-size: 1rem;
  min-width: 0;
}

.team-member:first-child {
  border-top: none;
}

.person-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 2px 0;
  margin: 0 0 8px 0;
  border-top: none;
  font-size: 1rem;
  min-width: 0;
  min-height: 50px;
}

.person-row:last-child {
  margin-bottom: 0;
}

.team-member-button,
.person-row-button {
  width: 100%;
  border: none;
  background: transparent;
  text-align: left;
  cursor: pointer;
  padding: 0;
  margin: 0;
}

.role-icon {
  background: linear-gradient(135deg, #F6EFE3, #F2E8D8);
  color: var(--accent-dark);
  width: 36px;
  height: 36px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.92rem;
  flex-shrink: 0;
  border: 1px solid rgba(184, 107, 36, 0.12);
  box-shadow: var(--shadow-xs);
}

.person-photo,
.person-avatar {
  width: 52px;
  height: 52px;
  border-radius: 16px;
  flex-shrink: 0;
  object-fit: cover;
  background: linear-gradient(135deg, #E5DED0, #D7CCB7);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.08rem;
  font-weight: 1000;
  color: var(--primary-dark);
  overflow: hidden;
  border: 2px solid rgba(255, 255, 255, 0.78);
  box-shadow: 0 4px 12px rgba(78, 57, 31, 0.08);
}

.person-photo.large,
.person-avatar.large {
  width: 72px;
  height: 72px;
  border-radius: 18px;
  font-size: 1.3rem;
}

.person-main {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  min-width: 0;
  width: 100%;
}

.member-main {
  flex: 1;
  min-width: 0;
}

.member-left,
.person-left {
  min-width: 0;
  flex: 1;
}

.member-inline {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  min-width: 0;
  width: 100%;
}

.person-name {
  font-size: 0.98rem;
  line-height: 1.2;
  font-weight: 1000;
  color: var(--primary-dark);
}

.member-name {
  font-size: 1rem;
  line-height: 1.25;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}

.member-role {
  font-size: 0.94rem;
  font-weight: 800;
  color: #7B756C;
  white-space: nowrap;
  flex-shrink: 0;
  text-align: right;
}

.highlight-me {
  background: linear-gradient(135deg, rgba(15, 90, 79, 0.10), rgba(184, 107, 36, 0.06));
  border-radius: 12px;
  padding: 10px 12px;
}

.phone-btn {
  width: 38px;
  height: 38px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, #FFF2E5, #FFEAD2);
  color: var(--accent-dark);
  font-size: 0.88rem;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  text-decoration: none;
  box-shadow: 0 3px 10px rgba(184, 107, 36, 0.10);
  transition: transform 0.14s ease, box-shadow 0.14s ease, background 0.14s ease;
  margin-left: auto;
}

.person-row.no-photo {
  padding-left: 2px;
}

.btn-group {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 2px;
}

.btn {
  border: none;
  padding: 14px;
  border-radius: 16px;
  font-weight: 1000;
  cursor: pointer;
  text-align: center;
  font-size: 0.95rem;
  line-height: 1.1;
  transition: transform 0.14s ease, box-shadow 0.14s ease, opacity 0.14s ease;
}

.btn-prev {
  background: linear-gradient(135deg, #E8E0D2, #DDD2C1);
  color: var(--primary-dark);
  box-shadow: var(--shadow-xs);
}

.btn-next {
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
  color: white;
  box-shadow: 0 6px 14px rgba(15, 90, 79, 0.18);
}

.btn[disabled] {
  opacity: 0.45;
  cursor: not-allowed;
  box-shadow: none;
}

.btn-link {
  width: 100%;
  margin-top: 12px;
  border: none;
  background: none;
  color: var(--accent-dark);
  font-size: 0.96rem;
  font-weight: 1000;
  padding: 8px;
  cursor: pointer;
}

.bottom-return-wrap {
  margin-top: 10px;
}

.bottom-return-btn {
  width: 100%;
  border: none;
  border-radius: 14px;
  padding: 13px;
  font-weight: 1000;
  cursor: pointer;
  text-align: center;
  font-size: 0.96rem;
  line-height: 1.1;
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
  color: white;
  box-shadow: 0 6px 14px rgba(15, 90, 79, 0.18);
}

.placeholder-text {
  color: var(--muted);
  font-size: 0.96rem;
  line-height: 1.45;
}

.sync-bar {
  font-size: 11px;
  line-height: 1.1;
  padding: 4px 10px;
  text-align: center;
  background: #EAF5EF;
  color: #2F6E5E;
  border-bottom: 1px solid rgba(15,90,79,0.08);
}

.sync-bar.hidden {
  display: none;
}

.sync-bar.ok {
  background: #EAF5EF;
  color: #2F6E5E;
}

.sync-bar.offline {
  background: #FFF1E9;
  color: #B45309;
}

.section-title {
  font-size: 1.02rem;
  font-weight: 1000;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--primary-dark);
  margin-bottom: 12px;
}

.mini-note {
  font-size: 0.8rem;
  color: var(--muted);
  margin-top: 2px !important;
  line-height: 1.1 !important;
  font-weight: 800;
}

.back-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}

.back-btn {
  border: none;
  background: none;
  font-size: 1.05rem;
  font-weight: 1000;
  color: var(--accent-dark);
  cursor: pointer;
  padding: 4px 0;
}

.person-head {
  display: flex;
  align-items: center;
  gap: 12px;
  min-width: 0;
}

.person-head-text {
  min-width: 0;
  flex: 1;
}

.person-head-name {
  font-size: 1.12rem;
  font-weight: 1000;
  line-height: 1.2;
  margin-bottom: 6px;
  color: var(--primary-dark);
}

.status-box {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding: 12px 14px;
  border-radius: 14px;
  background: #F8FAF8;
}

.status-box.current {
  background: linear-gradient(135deg, #EEF8F2, #E7F4ED);
}

.status-box.next {
  background: linear-gradient(135deg, #FFF4E8, #FEECD9);
}

.status-box.previous {
  background: linear-gradient(135deg, #F5EFE4, #EFE7DA);
}

.status-main {
  min-width: 0;
  flex: 1;
}

.status-title {
  font-size: 0.84rem;
  font-weight: 1000;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 6px;
}

.status-line {
  font-size: 1rem;
  font-weight: 850;
  color: var(--primary-dark);
  line-height: 1.35;
}

.search-wrap {
  margin-bottom: 10px;
}

.skeleton {
  position: relative;
  overflow: hidden;
  background: #E7DED0;
  border-radius: 10px;
}

.skeleton::after {
  content: "";
  position: absolute;
  inset: 0;
  transform: translateX(-100%);
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.7), transparent);
  animation: shimmer 1.1s infinite;
}

.skeleton-line {
  height: 12px;
  margin-bottom: 8px;
}

.skeleton-line:last-child {
  margin-bottom: 0;
}

.skeleton-line.w40 { width: 40%; }
.skeleton-line.w55 { width: 55%; }
.skeleton-line.w65 { width: 65%; }
.skeleton-line.w80 { width: 80%; }
.skeleton-line.w100 { width: 100%; }

.skeleton-avatar {
  width: 46px;
  height: 46px;
  border-radius: 12px;
  flex-shrink: 0;
}

@keyframes shimmer {
  100% {
    transform: translateX(100%);
  }
}

/* HOME FESTIVAL B */
.home-hero {
  position: relative;
  height: 190px !important;
  margin: -12px -12px 0 -12px;
  overflow: hidden;
  background:
    radial-gradient(circle at 10% 18%, rgba(255,255,255,0.14) 0 7%, transparent 8%),
    radial-gradient(circle at 84% 16%, rgba(214,176,122,0.22) 0 9%, transparent 10%),
    radial-gradient(circle at 22% 74%, rgba(15,90,79,0.18) 0 12%, transparent 13%),
    radial-gradient(circle at 76% 76%, rgba(184,107,36,0.18) 0 9%, transparent 10%),
    linear-gradient(135deg, #1C5A51 0%, #18443D 42%, #2B625A 100%);
}

.home-hero.compact-home-hero {
  height: 120px;
}

<script>
const WEBAPP_BASE_URL = "https://script.google.com/macros/s/AKfycbyDloUlkihvDTIlRYCiPrp0jy9vo4FRoZL2Bu7GT1eMTiKFM5dzH1NlsOnoqHoXMcqO/exec";

/*********************************
 * API FETCH
 *********************************/
async function apiGet_(params) {
  const url = new URL(WEBAPP_BASE_URL);
  Object.keys(params || {}).forEach(key => {
    const value = params[key];
    if (value !== undefined && value !== null) {
      url.searchParams.set(key, String(value));
    }
  });

  const response = await fetch(url.toString(), {
    method: "GET",
    cache: "no-store"
  });

  if (!response.ok) {
    throw new Error("HTTP_" + response.status);
  }

  const json = await response.json();
  return json;
}

async function apiCheckPassword_(password) {
  const res = await apiGet_({
    api: "checkPassword",
    pwd: password
  });

  if (!res || typeof res.valid !== "boolean") {
    throw new Error("INVALID_CHECK_PASSWORD_RESPONSE");
  }

  return res.valid;
}

async function apiGetUsers_(password) {
  const res = await apiGet_({
    api: "users",
    pwd: password
  });

  if (!res || !res.ok) {
    throw new Error((res && res.error) || "USERS_ERROR");
  }

  return Array.isArray(res.data) ? res.data : [];
}

async function apiGetBundle_(password, userId) {
  const res = await apiGet_({
    api: "bundle",
    pwd: password,
    userId: userId
  });

  if (!res || !res.ok) {
    throw new Error((res && res.error) || "BUNDLE_ERROR");
  }

  return res.data;
}

/*********************************
 * STATE GLOBAL
 *********************************/
let state = {
  currentView: "login",
  password: localStorage.getItem("planning_pwd") || "",
  userId: localStorage.getItem("planning_user_id") || "",
  userLabel: localStorage.getItem("planning_user_label") || "",
  allUsers: [],
  filteredUsers: [],
  selectedUserId: "",
  selectedUserLabel: "",
  returnViewAfterUserChange: "home",
  previousView: "home"
};

/*********************************
 * DIRECT : STATE
 *********************************/
let directState = {
  allShifts: [],
  currentIndex: -1,
  defaultIndex: -1,
  liveState: "next",
  isManual: false
};

/*********************************
 * DETAIL STATES
 *********************************/
let detailState = {
  shiftId: ""
};

let personDetailState = {
  personId: "",
  sourceView: "planning"
};

/*********************************
 * PLANNING : STATE
 *********************************/
let planningState = {
  allShifts: [],
  byDay: {},
  selectedDay: "",
  openShiftId: null
};;

let contactsState = {
  query: localStorage.getItem("planning_contacts_query") || ""
};

let mesCreneauxState = {
  autoScrolled: false
};
let homeConcertsState = {
  openMore: false
};
/*********************************
 * CACHE OFFLINE
 *********************************/
const CACHE_VERSION = "v1";
let APP_DATA = null;
  let autoRefreshTimer = null;
let uiMinuteTimer = null;
let syncHideTimer = null;
let internalNavLock = false;

/*********************************
 * CACHE HELPERS
 *********************************/
function getCacheKey() {
  if (!state.userId) return null;
  return "planning_cache_" + state.userId;
}

function saveCache(data) {
  try {
    const cacheKey = getCacheKey();
    if (!cacheKey) return;

    const payload = {
      savedAt: Date.now(),
      data: data
    };

    localStorage.setItem(cacheKey, JSON.stringify(payload));
  } catch (e) {
    console.error("Erreur saveCache", e);
  }
}

function loadCache() {
  try {
    const cacheKey = getCacheKey();
    if (!cacheKey) return null;

    const raw = localStorage.getItem(cacheKey);
    if (!raw) return null;

    const parsed = JSON.parse(raw);
    if (!parsed || !parsed.data) return null;

    return parsed.data;
  } catch (e) {
    console.error("Erreur loadCache", e);
    return null;
  }
}

function loadCacheTime() {
  try {
    const cacheKey = getCacheKey();
    if (!cacheKey) return null;

    const raw = localStorage.getItem(cacheKey);
    if (!raw) return null;

    const parsed = JSON.parse(raw);
    if (!parsed || !parsed.savedAt) return null;

    return Number(parsed.savedAt);
  } catch (e) {
    console.error("Erreur loadCacheTime", e);
    return null;
  }
}

function clearCache() {
  const cacheKey = getCacheKey();
  if (!cacheKey) return;
  localStorage.removeItem(cacheKey);
}

function shouldResetCache(cache) {
  if (!cache || !cache.meta) return false;
  if (cache.meta.version !== CACHE_VERSION) return true;

  const resetAfter =
    cache.meta.cacheResetAfter ||
    cache.meta.festivalEnd ||
    "2026-07-10T23:59:59";

  const limit = new Date(resetAfter).getTime();
  if (!isNaN(limit) && Date.now() > limit) return true;

  return false;
}

function isValidAppDataShape(data) {
  if (!data || typeof data !== "object") return false;
  if (!data.meta || typeof data.meta !== "object") return false;
  if (!data.user || typeof data.user !== "object") return false;
  if (!data.planning || typeof data.planning !== "object") return false;
  if (!Array.isArray(data.planning.allShifts)) return false;
  if (!data.direct || typeof data.direct !== "object") return false;
  if (!Array.isArray(data.direct.allShifts)) return false;
  if (!data.mesCreneaux || typeof data.mesCreneaux !== "object") return false;
  if (!Array.isArray(data.mesCreneaux.creneaux)) return false;
  return true;
}

function formatLastUpdateLabel(isoString) {
  if (!isoString) return "";

  const d = new Date(isoString);
  if (isNaN(d.getTime())) return "";

const now = getCurrentNowDate();
  
  const sameDay =
    d.getDate() === now.getDate() &&
    d.getMonth() === now.getMonth() &&
    d.getFullYear() === now.getFullYear();

  const yesterday = new Date();
  yesterday.setDate(now.getDate() - 1);

  const isYesterday =
    d.getDate() === yesterday.getDate() &&
    d.getMonth() === yesterday.getMonth() &&
    d.getFullYear() === yesterday.getFullYear();

  const time = d.toLocaleTimeString("fr-FR", {
    hour: "2-digit",
    minute: "2-digit"
  });

  if (sameDay) return "Aujourd’hui à " + time;
  if (isYesterday) return "Hier à " + time;

  const date = d.toLocaleDateString("fr-FR", {
    day: "2-digit",
    month: "2-digit"
  });

  return date + " à " + time;
}

function escapeHtml(value) {
  return String(value ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function normalizeText(value) {
  return String(value || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .trim();
}

function buildPlanningByDay(shifts) {

    grouped[day] = [];

  (Array.isArray(shifts) ? shifts : []).forEach(shift => {
    const day = String((shift && shift.jour) || "");
    if (!grouped[day]) grouped[day] = [];
    grouped[day].push(shift);
  });

  return grouped;
}

function parseConcertDateLabel(label) {
  if (!label) return null;

  const match = String(label).match(/^(\d{2})\/(\d{2})\s+(\d{2}):(\d{2})$/);
  if (!match) return null;

  const day = parseInt(match[1], 10);
  const month = parseInt(match[2], 10) - 1;
  const hour = parseInt(match[3], 10);
  const minute = parseInt(match[4], 10);

  return new Date(2026, month, day, hour, minute, 0, 0);
}

function getConcertTimelineState() {
  const concerts = Array.isArray(APP_DATA?.timeline?.all) ? APP_DATA.timeline.all : [];
  const now = getCurrentNowDate();

  let currentIndex = -1;
  let nextIndex = -1;

  for (let i = 0; i < concerts.length; i++) {
    const c = concerts[i];
    const start = parseConcertDateLabel(c.startLabel);
    const end = parseConcertDateLabel(c.endLabel);

    if (!start || !end) continue;

    if (now >= start && now < end) {
      currentIndex = i;
      nextIndex = i + 1 < concerts.length ? i + 1 : -1;
      break;
    }

    if (nextIndex === -1 && start > now) {
      nextIndex = i;
      break;
    }
  }

  return {
    concerts,
    currentIndex,
    nextIndex
  };
}

function parseDirectDateLabel(label) {
  if (!label) return null;

  const match = String(label).match(/^(\d{2})\/(\d{2})\s+(\d{2}):(\d{2})$/);
  if (!match) return null;

  const day = parseInt(match[1], 10);
  const month = parseInt(match[2], 10) - 1;
  const hour = parseInt(match[3], 10);
  const minute = parseInt(match[4], 10);

  return new Date(2026, month, day, hour, minute, 0, 0);
}

function getShiftDates(shift) {
  if (!shift) return null;

  const fixedShift = injectDefaultTimeForEdgeDays(shift);

  const startDate = parseDirectDateLabel(fixedShift.startLabel || "");
  const endDate = parseDirectDateLabel(fixedShift.endLabel || "");

  if (!startDate || !endDate) return null;

  return {
    startDate,
    endDate,
    shift: fixedShift
  };
}

function formatDirectDurationLabel(nowLabel, shiftStartLabel) {
  try {
    const now = parseDirectDateLabel(nowLabel);
    const start = parseDirectDateLabel(shiftStartLabel);

    if (!now || !start) return "";

    const diffMs = start.getTime() - now.getTime();
    if (diffMs <= 0) return "Commence bientôt";

    const totalMin = Math.floor(diffMs / 60000);
    const days = Math.floor(totalMin / 1440);
    const hours = Math.floor((totalMin % 1440) / 60);
    const minutes = totalMin % 60;

    if (days >= 2) {
      return `Commence dans ${days} jours`;
    }

    if (days === 1) {
      if (hours === 0) return "Commence demain";
      return `Commence demain à ${String(start.getHours()).padStart(2, "0")}h${String(start.getMinutes()).padStart(2, "0")}`;
    }

    if (hours <= 0) {
      if (minutes <= 1) return "Commence dans moins d’1 min";
      return `Commence dans ${minutes} min`;
    }

    if (minutes === 0) {
      return `Commence dans ${hours}h`;
    }

    return `Commence dans ${hours}h${String(minutes).padStart(2, "0")}`;
  } catch (e) {
    return "";
  }
}

function getShiftStatusInfo(shift) {
  const nowDate = getCurrentNowDate();
  const parsed = getShiftDates(shift);

  if (!parsed) {
    return {
      badgeClass: "next",
      badgeText: "À venir",
      timerText: ""
    };
  }

  const start = parsed.startDate;
  const end = parsed.endDate;

  if (nowDate < start) {
    const diff = start - nowDate;
    return {
      badgeClass: "next",
      badgeText: "À venir",
      timerText: "Commence dans " + formatDuration(diff)
    };
  }

  if (nowDate >= end) {
    return {
      badgeClass: "previous",
      badgeText: "Terminé",
      timerText: ""
    };
  }

  const diff = end - nowDate;
  return {
    badgeClass: "current",
    badgeText: "En cours",
    timerText: "Se termine dans " + formatDuration(diff)
  };
}
function computeDirectDefaultIndexFromNow(allShifts) {
  if (!Array.isArray(allShifts) || !allShifts.length) {
    return {
      defaultIndex: -1,
      liveState: "next"
    };
  }

  const now = getCurrentNowDate();
  let currentIndex = -1;
  let nextIndex = -1;

  for (let i = 0; i < allShifts.length; i++) {
    const entry = allShifts[i];
    const shift = entry && entry.shift ? entry.shift : null;
    const parsed = getShiftDates(shift);

    if (!parsed) continue;

    if (now >= parsed.startDate && now < parsed.endDate) {
      currentIndex = i;
      break;
    }

    if (nextIndex === -1 && parsed.startDate > now) {
      nextIndex = i;
    }
  }

  return {
    defaultIndex: currentIndex !== -1 ? currentIndex : nextIndex,
    liveState: currentIndex !== -1 ? "current" : "next"
  };
}
  
function formatDuration(ms) {
  if (!ms || ms <= 0) return "";

  const totalMinutes = Math.floor(ms / 60000);
  const days = Math.floor(totalMinutes / 1440);
  const hours = Math.floor((totalMinutes % 1440) / 60);
  const minutes = totalMinutes % 60;

  if (totalMinutes >= 1440) {
    return `${days} jour${days > 1 ? "s" : ""}`;
  }

  if (hours > 0) {
    if (minutes === 0) return `${hours}h`;
    return `${hours}h${minutes.toString().padStart(2, "0")}`;
  }

  return `${minutes} min`;
}

function formatShiftEndText(shift) {
  const fixedShift = injectDefaultTimeForEdgeDays(shift);
  if (!fixedShift || !fixedShift.fin) return "";
  return `Jusqu’à ${fixedShift.fin}`;
}

function formatShiftStartText(shift) {
  const fixedShift = injectDefaultTimeForEdgeDays(shift);
  if (!fixedShift || !fixedShift.debut) return "";
  return `À partir de ${fixedShift.debut}`;
}

    if (p !== 0) return p;
    return String(a.nom || "").localeCompare(String(b.nom || ""), "fr");
  });

function getPersonShifts(personId) {
  const shifts = getPlanningShiftsFromAppData(APP_DATA);
  const result = [];

  shifts.forEach(shift => {
    const people = Array.isArray(shift.benevoles) ? shift.benevoles : [];
    people.forEach(person => {
      if (String(person.id || "") !== String(personId || "")) return;

      const fixedShift = injectDefaultTimeForEdgeDays(shift);

      result.push({
        shiftId: fixedShift.id || "",
        jour: fixedShift.jour || "",
        debut: fixedShift.debut || "",
        fin: fixedShift.fin || "",
        libelle: fixedShift.libelle || "",
        ordre: fixedShift.ordre || 0,
        startLabel: fixedShift.startLabel || "",
        endLabel: fixedShift.endLabel || "",
        vehicule: person.vehicule || "-"
      });
    });
  });

  return result.sort((a, b) => Number(a.ordre || 9999) - Number(b.ordre || 9999));
}

function injectDefaultTimeForEdgeDays(shift) {
  if (!shift) return shift;

  const normalized = { ...shift };
  const jour = String(normalized.jour || "");

  const defaultTimes = {
    "Mardi": { debut: "09:00", fin: "12:00", date: "30/06" },
    "Lundi": { debut: "09:00", fin: "13:00", date: "06/07" }
  };

  const rule = defaultTimes[jour];
  if (!rule) return normalized;

  if (!normalized.debut || normalized.debut === "" || normalized.debut === "00:00") {
    normalized.debut = rule.debut;
  }

  if (!normalized.fin || normalized.fin === "" || normalized.fin === "00:00") {
    normalized.fin = rule.fin;
  }

  if (!normalized.startLabel || /00:00$/.test(normalized.startLabel)) {
    normalized.startLabel = `${rule.date} ${normalized.debut}`;
  }

  if (!normalized.endLabel || /00:00$/.test(normalized.endLabel)) {
    normalized.endLabel = `${rule.date} ${normalized.fin}`;
  }

  return normalized;
}

    if (now >= parsed.startDate && now < parsed.endDate) {
      return shift;
    }
  }

  return null;
}

function getUpcomingShiftForPerson(personId) {
  const now = getCurrentNowDate();
  const shifts = getPersonShifts(personId);

  let nextShift = null;
  let nextStart = null;

  for (const shift of shifts) {
    const parsed = getShiftDates(shift);
    if (!parsed) continue;

    if (parsed.startDate > now) {
      if (!nextStart || parsed.startDate < nextStart) {
        nextShift = shift;
        nextStart = parsed.startDate;
      }
    }
  }

  return nextShift;
}

/*********************************
 * OFFLINE-FIRST BOOTSTRAP
 *********************************/
async function loadAppData(forceRefresh = false) {
  let cache = loadCache();
  const cacheTime = loadCacheTime();

  if (shouldResetCache(cache)) {
    clearCache();
    cache = null;
  }

  if (cache && !isValidAppDataShape(cache)) {
    clearCache();
    cache = null;
  }

if (cache) {
  try {
    APP_DATA = cache;
    applyAppData(cache);

    const cacheLastUpdate = cache?.meta?.lastUpdate || (loadCacheTime() ? new Date(loadCacheTime()).toISOString() : null);

    if (!navigator.onLine) {
      showSyncStatus("offline", cacheLastUpdate);
    } else {
      showSyncStatus("ok", cacheLastUpdate);
    }

  } catch (e) {
    console.error("Erreur apply cache", e);
    clearCache();
    cache = null;
    APP_DATA = null;
  }
}

  let shouldRefresh = forceRefresh;

  if (!cache) {
    shouldRefresh = true;
  } else if (!forceRefresh && cacheTime) {
    const diffMin = (Date.now() - cacheTime) / 60000;
    if (diffMin >= 30) shouldRefresh = true;
  }

  if (!shouldRefresh) return;

  showSyncStatus("loading");

  try {
    const data = await apiGetBundle_(state.password, state.userId);

    if (!isValidAppDataShape(data)) {
      throw new Error("Structure bundle invalide");
    }

    APP_DATA = data;
    saveCache(data);
    applyAppData(data);
    showSyncStatus("ok", data?.meta?.lastUpdate || null);

  } catch (err) {
    console.error("Erreur serveur loadAppData", err);

    if (cache) {
      try {
        APP_DATA = cache;
        applyAppData(cache);
const cacheLastUpdate = cache?.meta?.lastUpdate || (loadCacheTime() ? new Date(loadCacheTime()).toISOString() : null);
showSyncStatus("offline", cacheLastUpdate);
      } catch (e) {
        console.error("Erreur fallback cache failure", e);
        APP_DATA = null;
        renderOfflineEmptyState();
        showSyncStatus("offline", null);
      }
    } else {
      APP_DATA = null;
      renderOfflineEmptyState();
      showSyncStatus("offline", null);
    }
  }
}

function applyAppData(data) {
  if (!isValidAppDataShape(data)) {
    throw new Error("APP_DATA invalide");
  }

  APP_DATA = data;

  planningState.allShifts = getPlanningShiftsFromAppData(data);
  planningState.byDay = buildPlanningByDay(planningState.allShifts);

  directState.allShifts = Array.isArray(data.direct.allShifts) ? data.direct.allShifts : [];
  directState.defaultIndex = typeof data.direct.defaultIndex === "number" ? data.direct.defaultIndex : -1;
  directState.liveState = data.direct.liveState || "next";

  if (!directState.isManual) {
    directState.currentIndex = directState.defaultIndex;
  } else if (
    directState.currentIndex < 0 ||
    directState.currentIndex >= directState.allShifts.length
  ) {
    directState.currentIndex = directState.defaultIndex;
    directState.isManual = false;
  }

  refreshCurrentViewOnly();
}

function updateShellForView(name) {
  const bottomNav = document.getElementById("shellBottomNav");
  const titleEl = document.getElementById("miniPageTitle");
  const inAppViews = ["home", "direct", "mes-creneaux", "planning", "contacts", "shift-detail", "person-detail"];

  if (inAppViews.includes(name)) {
    bottomNav.classList.remove("hidden");
    titleEl.textContent = getMiniPageTitle(name);

    if (name === "home") {
      titleEl.classList.add("home-title");
      titleEl.classList.remove("hidden");
    } else {
      titleEl.classList.remove("home-title");
      titleEl.classList.remove("hidden");
    }
  } else {
    bottomNav.classList.add("hidden");
    titleEl.classList.add("hidden");
    titleEl.classList.remove("home-title");
    titleEl.textContent = "";
  }
  
  document.querySelectorAll(".nav-item").forEach(btn => btn.classList.remove("active"));

  let activeName = name;
  if (name === "shift-detail") activeName = "mes-creneaux";
  if (name === "person-detail") {
    activeName =
      personDetailState.sourceView === "contacts" ? "contacts"
      : personDetailState.sourceView === "direct" ? "direct"
      : personDetailState.sourceView === "mes-creneaux" ? "mes-creneaux"
      : "planning";
  }

  const activeBtn = document.querySelector(`.nav-item[data-nav="${activeName}"]`);
  if (activeBtn) activeBtn.classList.add("active");
}

/*********************************
 * NAVIGATION
 *********************************/
function showView(name, options = {}) {
  const opts = Object.assign({ push: true, restore: null, preserveScroll: false }, options);

  const alreadyActiveInDom = document.getElementById("view-" + name)?.classList.contains("active");
  const previousViewName = state.currentView;

  if (
    state.currentView === name &&
    alreadyActiveInDom &&
    !opts.restore &&
    name !== "direct" &&
    name !== "person-detail" &&
    name !== "shift-detail"
  ) {
    updateShellForView(name);
    return;
  }

  if (opts.restore) {
    applyStoredState(opts.restore);
  }

  if (name === "mes-creneaux" && previousViewName !== "mes-creneaux") {
    mesCreneauxState.autoScrolled = false;
  }

  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  const target = document.getElementById("view-" + name);
  if (target) target.classList.add("active");

  state.currentView = name;
  saveLastView(name);
  updateShellForView(name);

  try {
    if (name === "home") renderHome();
    if (name === "mes-creneaux") loadMesCreneaux();
    if (name === "direct") loadDirect();
    if (name === "planning") loadPlanning();
    if (name === "contacts") loadContacts();
    if (name === "shift-detail") loadShiftDetail();
    if (name === "person-detail") loadPersonDetail();

    if (opts.push && name !== "login" && name !== "select-user") {
      pushHistoryState(name);
    }

    if (opts.restore && typeof opts.restore.scrollTop === "number") {
      requestAnimationFrame(() => setMainScrollTop(opts.restore.scrollTop));
    } else if (!opts.preserveScroll) {
      scrollMainToTop();
    }
  } catch (e) {
    console.error("Erreur showView", e);
    renderSafeError("view-" + name, "Impossible d’afficher cette page.");
  }
}

function refreshCurrentViewOnly() {
  try {
    if (state.currentView === "home") renderHome();
    if (state.currentView === "mes-creneaux") loadMesCreneaux();
    if (state.currentView === "direct") loadDirect();
    if (state.currentView === "planning") loadPlanning();
    if (state.currentView === "contacts") loadContacts();
    if (state.currentView === "shift-detail") loadShiftDetail();
    if (state.currentView === "person-detail") loadPersonDetail();
  } catch (e) {
    console.error("Erreur refreshCurrentViewOnly", e);
  }
}

async function login() {
  const pwdInput = document.getElementById("pwd");
  const loginError = document.getElementById("loginError");
  const loginSuccess = document.getElementById("loginSuccess");

  const pwd = pwdInput.value;
  loginError.textContent = "";

    console.error("Erreur login", err);

  }

async function loadUsers() {
  const container = document.getElementById("userList");
  const userError = document.getElementById("userError");

  container.innerHTML = renderSkeletonList(4);
  userError.textContent = "";

  try {
    const data = await apiGetUsers_(state.password);
    const users = Array.isArray(data) ? data.slice() : [];

    users.sort((a, b) => {
      const labelA = String(a.label || "").trim();
      const labelB = String(b.label || "").trim();

      const prenomA = normalizeText(labelA.split(/\s+/)[0] || "");
      const prenomB = normalizeText(labelB.split(/\s+/)[0] || "");

      const nomA = normalizeText(labelA.split(/\s+/).slice(1).join(" "));
      const nomB = normalizeText(labelB.split(/\s+/).slice(1).join(" "));

      const cmpPrenom = prenomA.localeCompare(prenomB, "fr");
      if (cmpPrenom !== 0) return cmpPrenom;

      return nomA.localeCompare(nomB, "fr");
    });

    state.allUsers = users;
    state.filteredUsers = users.slice();
    renderUserList(state.filteredUsers);
    document.getElementById("searchUser").value = "";
    showView("select-user", { push: false });

  } catch (err) {
    console.error("Erreur loadUsers", err);
    userError.textContent = err && err.message ? err.message : "Impossible de charger les bénévoles.";
    showView("select-user", { push: false });
  }
}

function renderUserList(list) {
  const container = document.getElementById("userList");

  if (!list.length) {
    container.innerHTML = "Aucun bénévole";
    return;
  }

  let html = "";

  list.forEach(u => {
    const active = String(u.id || "") === String(state.selectedUserId || "");
    html += `
      <button
        type="button"
        class="user-row ${active ? "active-user" : ""}"
        onclick="selectUser('${escapeHtml(u.id || "")}','${escapeHtml(u.label || "")}')"
      >
        ${escapeHtml(u.label || "")}
      </button>
    `;
  });

  container.innerHTML = html;
}

function selectUser(id, label) {
  state.selectedUserId = id;

function filterUsers() {
  const q = normalizeText(document.getElementById("searchUser").value);
  state.filteredUsers = !q
    ? state.allUsers.slice()
    : state.allUsers.filter(u => normalizeText(u.label || "").includes(q));

  renderUserList(state.filteredUsers);

function getFestivalPhase(personId) {
  const now = getCurrentNowDate();

  const start = new Date("2026-07-01T00:00:00");
  start.setHours(0, 0, 0, 0);

  const hasMonday = personHasMondayShift(personId);

  const end = hasMonday
    ? new Date("2026-07-06T13:00:00")
    : new Date("2026-07-06T03:00:00");

  if (now < start) return "before";
  if (now > end) return "after";
  return "during";
}

  const phase = getFestivalPhase(personId);

  const current = getCurrentShiftForPerson(personId);

  if (phase === "during" && (current || next)) return null;

  if (phase === "after") {
    return {

      sub: "À l’année prochaine !",
      className: "previous"

  return null;

/*********************************
 * ROLE / PEOPLE RENDER
 *********************************/
function getRoleInfo(rawVehicule) {
  const v = String(rawVehicule || "").toUpperCase().trim();

  if (v.includes("CHARGEUR_SUP")) {
    return { icon: "🧑‍✈️", label: "Chargeur sup", group: "chargeurs", order: "ZZZ_1" };
  }
  if (v.includes("CHARGEUR")) {
    return { icon: "🧑‍✈️", label: "Chargeur", group: "chargeurs", order: "ZZZ_2" };
  }
  if (v && v !== "-") {
    return { icon: "🚗", label: "Véhicule " + rawVehicule, group: "chauffeurs", order: v };
  }
  return { icon: "🚶", label: "Sans véhicule", group: "chargeurs", order: "ZZZ_9" };
}

function sortPeopleForShift(list) {
  return (list || []).slice().sort((a, b) => {
    const ia = getRoleInfo(a.vehicule);
    const ib = getRoleInfo(b.vehicule);

    const groupRankA = ia.group === "chauffeurs" ? 1 : 2;
    const groupRankB = ib.group === "chauffeurs" ? 1 : 2;

    if (groupRankA !== groupRankB) return groupRankA - groupRankB;

    const keyCmp = ia.order.localeCompare(ib.order, "fr");
    if (keyCmp !== 0) return keyCmp;

    return String(a.label || a.benevole || "").localeCompare(String(b.label || b.benevole || ""), "fr");
  });
}

function renderPeople(people, sourceView = "direct") {
  const sorted = sortPeopleForShift(people);

  if (!sorted.length) {
    return `<div class="team-member"><div class="member-main"><div class="member-role">Personne sur ce créneau</div></div></div>`;
  }

  let html = "";
  let currentGroup = "";
  const peopleMap = getPeopleIndexFromAppData();

  sorted.forEach(person => {
    const info = getRoleInfo(person.vehicule);
    const currentPersonLabel = String(person.label || person.benevole || "").toLowerCase();
    const meLabel = String(state.userLabel || "").toLowerCase();
    const full = peopleMap[person.id] || {
      id: person.id || "",
      label: person.label || person.benevole || "",
      tel: "",
      photo: ""
    };

    if (info.group !== currentGroup) {
      currentGroup = info.group;
      html += `
        <div class="group-label">
          ${currentGroup === "chauffeurs" ? "Chauffeurs" : "Chargeurs"}
        </div>
      `;
    }

    html += `
      <button
        type="button"
        class="team-member team-member-button ${currentPersonLabel === meLabel ? "highlight-me" : ""}"
        onclick="openPersonDetail('${escapeHtml(full.id || "")}', '${escapeHtml(sourceView)}')"
      >
        <div class="role-icon">${info.icon}</div>
        <div class="member-main">
          <div class="member-inline">
            <div class="member-name">${escapeHtml(full.label || "")}</div>
            <div class="member-role">${escapeHtml(info.label)}</div>
          </div>
        </div>
      </button>
    `;
  });

  return html;
}

function loadDirect() {

function applyDirectData(data) {
  const container = document.getElementById("directContent");
  if (!container) return;

  if (!data || !Array.isArray(data.allShifts)) {
    container.innerHTML = `<div class="card"><div class="error">Données direct invalides</div></div>`;
    return;
  }

  directState.allShifts = data.allShifts;

  const computedDirect = computeDirectDefaultIndexFromNow(directState.allShifts);

  directState.defaultIndex = computedDirect.defaultIndex;
  directState.liveState = computedDirect.liveState;

 if (!directState.isManual) {
  directState.currentIndex = directState.defaultIndex;
} else if (
  directState.currentIndex < 0 ||
  directState.currentIndex >= directState.allShifts.length
) {
  directState.currentIndex = directState.defaultIndex;
  directState.isManual = false;
}

  const entryAtDefault =
    directState.defaultIndex >= 0
      ? directState.allShifts[directState.defaultIndex]
      : null;

  const liveShift =
    entryAtDefault && entryAtDefault.shift
      ? getShiftStatusInfo(entryAtDefault.shift)
      : null;

  const liveIsCurrent = liveShift && liveShift.badgeClass === "current";

  if (directState.currentIndex === directState.defaultIndex && !liveIsCurrent) {
    renderDirectRestScreen(entryAtDefault);
  } else {
    renderDirectCurrentView();
  }
}

function renderDirectRestScreen(nextEntry) {
  const container = document.getElementById("directContent");
  if (!container) return;

  const timer = nextEntry && nextEntry.shift
    ? formatDirectDurationLabel(getCurrentNowLabel(), nextEntry.shift.startLabel)
    : "";

  container.innerHTML = `
    <div class="card direct-rest-card">
      ${isTestMode() ? `<div class="meta-line">Heure actuelle : ${escapeHtml(getCurrentNowLabel())}</div>` : ""}
      <div class="direct-rest-title">Aucun créneau en cours</div>
      <div class="direct-rest-subtitle">Profite du calme, ça ne va pas durer.</div>
      ${timer ? `<div class="timer-line">${escapeHtml(timer)}</div>` : ""}
    </div>

    <div class="card">
      <button class="direct-main-btn" onclick="goToDefaultShift()" ${!nextEntry ? "disabled" : ""}>
        Voir le prochain créneau
      </button>
    </div>
  `;
}

function renderDirectCurrentView() {
  const container = document.getElementById("directContent");
  if (!container) return;

  if (!directState.allShifts.length || directState.defaultIndex < 0) {
    container.innerHTML = `
      <div class="card empty-state-card">
        <div class="empty-state-title">Aucun créneau disponible</div>
        <div class="empty-state-subtitle">Le direct n’a rien à afficher pour le moment.</div>
      </div>
    `;
    return;
  }

  if (directState.currentIndex < 0 || directState.currentIndex >= directState.allShifts.length) {
    directState.currentIndex = directState.defaultIndex;
  }

  const entry = directState.allShifts[directState.currentIndex];
  const shift = entry.shift || {};
  const people = entry.benevoles || [];
  const stateInfo = getShiftStatusInfo(shift);

  const prevDisabled = directState.currentIndex <= 0 ? "disabled" : "";
  const nextDisabled = directState.currentIndex >= directState.allShifts.length - 1 ? "disabled" : "";

  container.innerHTML = `
    <div class="card direct-main-card">
      ${isTestMode() ? `<div class="meta-line">Heure actuelle : ${escapeHtml(getCurrentNowLabel())}</div>` : ""}

      <div class="shift-header">
        <div class="shift-line">${escapeHtml(formatShiftLine(shift))}</div>
        <span class="badge ${stateInfo.badgeClass}">${escapeHtml(stateInfo.badgeText)}</span>
      </div>

      ${stateInfo.timerText ? `<div class="helper-text">${escapeHtml(stateInfo.timerText)}</div>` : ""}
      <hr class="soft-divider">
      ${renderPeople(people, "direct")}
    </div>

    <div class="card">
      <div class="btn-group">
        <button class="btn btn-prev" onclick="directPrevious()" ${prevDisabled}>⬅ Précédent</button>
        <button class="btn btn-next" onclick="directNext()" ${nextDisabled}>Suivant ➡</button>
      </div>

      <button class="btn-link" onclick="directBackToLive()">Retour au direct</button>
    </div>
  `;
}

function goToDefaultShift() {
  if (directState.allShifts.length && directState.defaultIndex >= 0) {
    directState.currentIndex = directState.defaultIndex;
    directState.isManual = false;
    renderDirectCurrentView();
    scrollMainToTop();
  }
}

function directPrevious() {
  if (directState.currentIndex > 0) {
    directState.currentIndex--;
    directState.isManual = true;
    renderDirectCurrentView();
    scrollMainToTop();
  }
}

function directNext() {
  if (directState.currentIndex < directState.allShifts.length - 1) {
    directState.currentIndex++;
    directState.isManual = true;
    renderDirectCurrentView();
    scrollMainToTop();
  }
}

function directBackToLive() {
  directState.isManual = false;
  directState.currentIndex = directState.defaultIndex;
  applyDirectData(APP_DATA?.direct || {});
  scrollMainToTop();
}

function renderContactsListOnly() {

  `;
}

function sortReferentsCustom(list) {
  const order = ["herve", "jerome", "anthony"];

  return (list || []).slice().sort((a, b) => {
    const aPrenom = normalizeText(a.prenom || "");
    const bPrenom = normalizeText(b.prenom || "");

    const aIndex = order.indexOf(aPrenom);
    const bIndex = order.indexOf(bPrenom);

    const safeA = aIndex === -1 ? 999 : aIndex;
    const safeB = bIndex === -1 ? 999 : bIndex;

    if (safeA !== safeB) return safeA - safeB;

    return String(a.prenom || "").localeCompare(String(b.prenom || ""), "fr");
  });
}

          <div class="status-main">
            <div class="status-title">Prochain créneau</div>
            <div class="status-line">${escapeHtml(next.jour)} • ${escapeHtml(next.debut)} – ${escapeHtml(next.fin)} • ${escapeHtml(role.label)}</div>
          </div>
          <span class="badge next">À venir</span>
        </div>
      </div>
    `;
  } else if (message) {
    statusBlock = `
      <div class="card compact">
        <div class="status-box previous">
          <div class="status-main">
            <div class="status-title">Message</div>
            <div class="status-line">${escapeHtml(message.title)}</div>
            <div class="subtle-text" style="margin-top:4px;">${escapeHtml(message.sub)}</div>
          </div>
        </div>
      </div>
    `;
  }

  let daysHtml = "";

  shifts.forEach(shift => {
    const role = getRoleInfo(shift.vehicule);
    const info = getShiftStatusInfo(shift);

    daysHtml += `
      <div class="card compact ${info.badgeClass === 'current' ? 'home-main-card' : ''}">
        <div class="shift-header">
          <div class="shift-line">${escapeHtml(formatShiftLine(shift))}</div>
          <span class="badge ${info.badgeClass}">${escapeHtml(info.badgeText)}</span>
        </div>
        <div class="subtle-text">${escapeHtml(role.label)}</div>
      </div>
    `;
  });

  container.innerHTML = `
    <div class="back-row">
      <button type="button" class="back-btn" onclick="navigateBack(personDetailState.sourceView || 'planning')">← Retour</button>
    </div>

    <div class="card">
      <div class="person-head">
        ${renderAvatar(person, true)}
        <div class="person-head-text">
          <div class="person-head-name">${escapeHtml([person.prenom, person.nom].filter(Boolean).join(" ").trim() || person.label || "")}</div>
          <div class="subtle-text">${person.tel ? escapeHtml(person.tel) : "Téléphone non renseigné"}</div>
        </div>
        ${renderCallButton(person.tel)}
      </div>
    </div>

    ${statusBlock}

    <div class="card">
      <div class="section-title">Créneaux</div>
      ${daysHtml || `<div class="subtle-text">Aucun créneau.</div>`}
    </div>
  `;
}

 function printPlanningForDay(day) {
  closePrintDayPicker();

  if (!APP_DATA || !APP_DATA.planning) return;

  const shifts = (planningState.byDay && planningState.byDay[day]) ? planningState.byDay[day] : [];

  if (!shifts.length) return;

  let html = `
    <h1>Planning du jour</h1>
    <div class="print-subtitle">${escapeHtml(day)}</div>
  `;

  // 👇 LA DIFF : grille 3 colonnes
  html += `<div class="print-day-grid">`;

  shifts.forEach(shift => {
    const people = Array.isArray(shift.benevoles) ? sortPeopleForShift(shift.benevoles) : [];

    html += `
      <div class="print-card print-card-column">
        <div class="print-line">${escapeHtml(formatShiftLine(shift))}</div>
        <div class="print-meta">
          ${
            people.length
              ? people.map(person => {
                  const info = getRoleInfo(person.vehicule);
                  const label = person.label || person.benevole || "";
                  const roleClass = info.group === "chauffeurs" ? "driver" : "loader";

                  return `
                    <div class="print-person-row">
                      <span class="print-person-name">${escapeHtml(label)}</span>
                      <span class="print-person-role ${roleClass}">${escapeHtml(info.label)}</span>
                    </div>
                  `;
                }).join("")
              : `<div class="print-empty">Personne sur ce créneau</div>`
          }
        </div>
      </div>
    `;
  });

  html += `</div>`;

  openPrintWindow("Planning " + day, html);
}

  function printFullPlanningDetailed() {
  closePrintModal();

  if (!APP_DATA || !APP_DATA.planning || !Array.isArray(APP_DATA.planning.allShifts)) {
    return;
  }

  const allShifts = APP_DATA.planning.allShifts
    .slice()
    .sort((a, b) => Number(a.ordre || 9999) - Number(b.ordre || 9999));

  if (!allShifts.length) return;

  const byDay = {};
  const daysOrder = ["Mardi", "Mercredi", "Jeudi", "Vendredi", "Samedi", "Dimanche", "Lundi"];

  allShifts.forEach(shift => {
    const day = shift.jour || "";
    if (!byDay[day]) byDay[day] = [];
    byDay[day].push(shift);
  });

  let html = `<h1>Planning complet</h1>`;

  daysOrder.forEach(day => {
    const shifts = byDay[day] || [];
    if (!shifts.length) return;

    html += `<div class="print-day">${escapeHtml(day)}</div>`;
    html += `<div class="print-day-grid">`;

    shifts.forEach(shift => {
      const people = Array.isArray(shift.benevoles) ? sortPeopleForShift(shift.benevoles) : [];

      html += `
        <div class="print-card print-card-column">
          <div class="print-line">${escapeHtml((shift.debut || "") + " – " + (shift.fin || ""))}</div>
          <div class="print-meta">
            ${
              people.length
                ? people.map(person => {
                    const info = getRoleInfo(person.vehicule);
                    const label = person.label || person.benevole || "";
                    const roleClass = info.group === "chauffeurs" ? "driver" : "loader";

                    return `
                      <div class="print-person-row">
                        <span class="print-person-name">${escapeHtml(label)}</span>
                        <span class="print-person-role ${roleClass}">${escapeHtml(info.label)}</span>
                      </div>
                    `;
                  }).join("")
                : `<div class="print-empty">Personne sur ce créneau</div>`
            }
          </div>
        </div>
      `;
    });

    html += `</div>`;
  });

  openPrintWindow("Planning complet", html);
}

  function printMyPlanningDetailed() {
  closePrintModal();

  if (!APP_DATA || !APP_DATA.mesCreneaux || !Array.isArray(APP_DATA.mesCreneaux.creneaux)) {
    return;
  }

  const list = APP_DATA.mesCreneaux.creneaux
    .slice()
    .sort((a, b) => Number(a.ordre || 9999) - Number(b.ordre || 9999));

  if (!list.length) return;

  let html = `

    <div class="print-subtitle">
      ${escapeHtml(state.userLabel || "")}
    </div>
  `;

  list.forEach(entry => {

 openPrintWindow("Mes créneaux", html);
}

  function openPrintWindow(title, bodyHtml) {
  const oldFrame = document.getElementById("printFrame");
  if (oldFrame) oldFrame.remove();

  const iframe = document.createElement("iframe");
  iframe.id = "printFrame";
  iframe.style.position = "fixed";
  iframe.style.right = "0";
  iframe.style.bottom = "0";
  iframe.style.width = "0";
  iframe.style.height = "0";
  iframe.style.border = "0";
  iframe.style.opacity = "0";
  iframe.style.pointerEvents = "none";

  document.body.appendChild(iframe);

  const doc = iframe.contentWindow.document;

  doc.open();
  doc.write(`
    <!DOCTYPE html>
    <html lang="fr">
    <head>
      <meta charset="UTF-8">
      <title>${escapeHtml(title)}</title>

      <style>
  @page {
    size: A4 landscape;
    margin: 10mm;
  }

  body {
    font-family: Arial, sans-serif;
    margin: 0;
    color: #111;
    font-size: 11px;
  }

  h1 {
    text-align: center;
    margin: 0 0 12px 0;
    font-size: 22px;
  }

  .print-subtitle {
    text-align: center;
    margin-bottom: 20px;
    font-size: 14px;
    color: #555;
  }

  .print-day {
    margin-top: 18px;
    margin-bottom: 8px;
    font-size: 18px;
    font-weight: bold;
    border-bottom: 2px solid #000;
    padding-bottom: 4px;
    page-break-after: avoid;
  }

  .print-day-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    align-items: start;
  }

  .print-card {
    border: 1px solid #ccc;
    border-radius: 8px;
    padding: 8px;
    page-break-inside: avoid;
    break-inside: avoid;
    background: #fff;
  }

  .print-card-column {
    min-height: 100%;
  }

  .print-line {
    font-size: 14px;
    font-weight: bold;
    margin-bottom: 8px;
    border-bottom: 1px solid #ddd;
    padding-bottom: 4px;
  }

  .print-meta {
    font-size: 11px;
    line-height: 1.35;
  }

  .print-person-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 10px;
    padding: 2px 0;
    border-bottom: 1px dotted #eee;
  }

  .print-person-row:last-child {
    border-bottom: none;
  }

  .print-person-name {
    flex: 1;
    text-align: left;
    min-width: 0;
  }

  .print-person-role {
    flex-shrink: 0;
    text-align: right;
    white-space: nowrap;
    font-weight: bold;
  }

  .driver {
    color: #0f5a4f;
  }

  .loader {
    color: #a16207;
  }

  .print-role {
    font-size: 13px;
    color: #444;
  }

  .print-empty {
    color: #666;
    font-style: italic;
  }

  @media print {
    body {
      margin: 0;
    }
  }
</style>
    </head>

    <body>
      ${bodyHtml}
    </body>
    </html>
  `);
  doc.close();

  setTimeout(() => {
    iframe.contentWindow.focus();
    iframe.contentWindow.print();
  }, 300);
}
  
/*********************************
 * BOOT
 *********************************/
async function boot() {
  try {
    if (!state.password) {
      state.currentView = "login";
      showView("login", { push: false });
      replaceHistoryRoot("login");
      return;
    }

    let cache = loadCache();

    if (shouldResetCache(cache)) {
      clearCache();
      cache = null;
    }

    if (cache && !isValidAppDataShape(cache)) {
      clearCache();
      cache = null;
    }

    if (cache && state.userId) {
      try {
        APP_DATA = cache;
        applyAppData(cache);

        const targetView = getLastView();
        showView(targetView, { push: false });
        replaceHistoryRoot(targetView);

        startAutoRefresh();
        startUiMinuteRefresh();

        if (navigator.onLine) {
          loadAppData(false);
        } else {
showSyncStatus("offline", cache?.meta?.lastUpdate || (loadCacheTime() ? new Date(loadCacheTime()).toISOString() : null));
        }
        return;
      } catch (e) {
        console.error("Erreur boot cache", e);
        clearCache();
        APP_DATA = null;
      }
    }

    if (!navigator.onLine) {
      showView("login", { push: false });
      replaceHistoryRoot("login");
      return;
    }

    const ok = await apiCheckPassword_(state.password);

    if (!ok) {
      localStorage.removeItem("planning_pwd");
      localStorage.removeItem("planning_user_id");
      localStorage.removeItem("planning_user_label");
      localStorage.removeItem("planning_contacts_query");

      state.password = "";
      state.userId = "";
      state.userLabel = "";

      showView("login", { push: false });
      replaceHistoryRoot("login");
      return;
    }

    if (state.userId) {
      await loadAppData(false);
      startAutoRefresh();
      startUiMinuteRefresh();

      const targetView = getLastView();
      showView(targetView, { push: false });
      replaceHistoryRoot(targetView);
    } else {
      await loadUsers();
    }

  } catch (err) {
    console.error("Erreur boot générale", err);

    const fallbackCache = loadCache();

    if (fallbackCache && isValidAppDataShape(fallbackCache) && state.userId) {
      try {
        APP_DATA = fallbackCache;
        applyAppData(fallbackCache);

        const targetView = getLastView();
        showView(targetView, { push: false });
        replaceHistoryRoot(targetView);

        startAutoRefresh();
        startUiMinuteRefresh();
showSyncStatus("offline", fallbackCache?.meta?.lastUpdate || (loadCacheTime() ? new Date(loadCacheTime()).toISOString() : null));
      } catch (e) {
        console.error("Erreur fallback boot", e);
        showView("login", { push: false });
        replaceHistoryRoot("login");
      }
    } else {
      showView("login", { push: false });
      replaceHistoryRoot("login");
    }
  }
}

/*********************************
 * EVENTS
 *********************************/
document.addEventListener("DOMContentLoaded", function() {

  const pwd = document.getElementById("pwd");
  if (pwd) {
    pwd.addEventListener("keydown", function(e) {
      if (e.key === "Enter") login();
    });
  }

  const searchUser = document.getElementById("searchUser");
  if (searchUser) {
    searchUser.addEventListener("input", filterUsers);
  }

  window.addEventListener("error", function(e) {
    console.error("Erreur JS globale", e.error || e.message);
  });

  window.addEventListener("popstate", function(e) {
    if (internalNavLock) return;
    const st = e.state;
    if (st && st.app) {
      showView(st.view || "home", {
        push: false,
        restore: st.saved || null,
        preserveScroll: true
      });
    }
  });

  boot();
});

document.addEventListener("visibilitychange", function() {
  if (document.visibilityState === "visible") {
    if (navigator.onLine && state.password && state.userId) {
      loadAppData(false);
    }
  }
});

window.addEventListener("online", () => {
  console.log("Retour en ligne → refresh");

  setTimeout(() => {
    loadAppData(true);
  }, 1500);
});
