<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    /* =========================================================
       CSS COMPLET (Design Festival Beau Regard)
       ========================================================= */
    :root {
      --bg: #F6F2E9; --bg-soft: #EFE8DB; --card: #FFFDF7;
      --text: #18443D; --text-strong: #0F5A4F; --muted: #6F7364;
      --primary: #0F5A4F; --primary-dark: #18443D; --accent: #B86B24;
      --accent-dark: #96561D; --shadow: 0 12px 28px rgba(78, 57, 31, 0.10);
      --bottomnav-h: 88px;
    }

    html, body {
      margin: 0; padding: 0; width: 100%; min-height: 100%;
      background: linear-gradient(180deg, #F8F4EC 0%, #F3EEE4 48%, #EFE8DB 100%);
      font-family: -apple-system, system-ui, sans-serif; color: var(--text);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    .app-shell { min-height: 100vh; display: flex; flex-direction: column; }
    .hidden { display: none !important; }

    .main-content {
      flex: 1; overflow-y: auto; padding: 12px;
      padding-bottom: calc(var(--bottomnav-h) + 18px);
    }

    .mini-page-title {
      font-size: 0.84rem; font-weight: 1000; color: var(--primary-dark);
      text-transform: uppercase; text-align: center; padding: 4px 4px 12px;
    }

    .page { display: none; }
    .page.active { display: block; }

    .card {
      background: var(--card); border-radius: 16px; padding: 12px;
      box-shadow: var(--shadow); margin-bottom: 10px;
      border: 1px solid rgba(222, 212, 194, 0.78);
    }

    .card.home-main-card { border-left: 7px solid var(--accent); position: relative; overflow: hidden; }

    .input {
      width: 100%; border-radius: 14px; border: 1px solid #d6e3db;
      padding: 10px 14px; margin-bottom: 10px; font-size: 16px;
    }

    .btn-dark {
      width: 100%; padding: 13px; border-radius: 14px; border: none;
      background: var(--primary); color: white; font-weight: 900; cursor: pointer;
    }

    .btn-light {
      width: 100%; padding: 13px; border-radius: 14px; border: 1px solid #ccc;
      background: white; margin-top: 10px; cursor: pointer;
    }

    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; height: var(--bottomnav-h);
      background: #123d38; display: flex; justify-content: space-around;
      padding: 8px 8px calc(env(safe-area-inset-bottom) + 10px); z-index: 60;
    }

    .nav-item {
      color: rgba(255,255,255,0.7); display: flex; flex-direction: column;
      align-items: center; font-size: 0.8rem; border: none; background: none; flex: 1;
    }

    .nav-item.active { color: white; border-top: 3px solid var(--accent); }
    .nav-icon { font-size: 1.4rem; margin-bottom: 4px; }

    .badge { padding: 5px 12px; border-radius: 999px; font-size: 0.75rem; font-weight: 800; color: white; }
    .badge.current { background: #1F7A5C; }
    .badge.next { background: #B86B24; }
    .badge.previous { background: #9A8B7B; }

    .user-row { width: 100%; text-align: left; padding: 12px; border: 1px solid #eee; border-radius: 10px; margin-bottom: 5px; background: #fff; font-weight: bold; }
    
    /* Styles pour la liste des contacts et bénévoles */
    .team-member { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-top: 1px solid #eee; width: 100%; background: none; border-left: none; border-right: none; text-align: left; cursor: pointer; }
    .role-icon { background: #f0f0f0; width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    .member-name { font-weight: bold; color: var(--primary-dark); }
    .member-role { font-size: 0.85rem; color: var(--muted); }

    .sync-bar { font-size: 12px; padding: 6px; text-align: center; border-bottom: 1px solid #ddd; }
    .sync-bar.ok { background: #e6f4ea; color: #1e8e3e; }

    /* Modals */
    .print-modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: flex-end; justify-content: center; z-index: 1000; }
    .print-modal { width: 100%; max-width: 500px; background: white; padding: 20px; border-radius: 24px 24px 0 0; }
  </style>
</head>

<body>
  <div class="app-shell">
    <div id="syncStatusBar" class="sync-bar hidden"></div>

    <main class="main-content" id="mainContent">
      <div id="miniPageTitle" class="mini-page-title hidden"></div>

      <section id="view-login" class="page active">
        <div class="auth-wrap" style="padding-top: 50px;">
          <div class="card">
            <h2 style="margin-top:0">Accès planning</h2>
            <p>Entre le mot de passe pour accéder au planning.</p>
            <input id="pwd" class="input" type="password" placeholder="Mot de passe">
            <button class="btn-dark" onclick="login()">Valider</button>
            <div id="loginError" class="error" style="color:red; margin-top:10px;"></div>
          </div>
        </div>
      </section>

      <section id="view-select-user" class="page">
        <div class="card">
          <h2 style="margin-top:0">Choisir ton profil</h2>
          <input id="searchUser" class="input" type="text" placeholder="Rechercher..." oninput="filterUsers()">
          <div id="userList" style="max-height: 400px; overflow-y: auto;"></div>
          <button class="btn-light" onclick="backToLogin()">Retour</button>
        </div>
      </section>

      <section id="view-home" class="page"><div id="homeContent"></div></section>
      <section id="view-mes-creneaux" class="page"><div id="mesCreneauxContent"></div></section>
      <section id="view-direct" class="page"><div id="directContent"></div></section>
      <section id="view-planning" class="page"><div id="planningContent"></div></section>
      <section id="view-contacts" class="page"><div id="contactsContent"></div></section>
      <section id="view-person-detail" class
